<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Web Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="terminal-container"></div>
  <textarea id="mobile-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

  <div class="toolbar">
    <button onclick="sendKey('Tab')" title="Tab">⇥</button>
    <button onclick="toggleCtrl()" id="btn-ctrl" title="Ctrl">⌃</button>
    <button onclick="sendKey('\x03')" title="C">C</button>
    <button onclick="sendKey('\x04')" title="D">D</button>
    <button onclick="sendKey('\x1b')" title="Escape">⎋</button>
    <button onclick="sendKey('\x1b[A')" title="Up">↑</button>
    <button onclick="sendKey('\x1b[B')" title="Down">↓</button>
    <button onclick="sendKey('\x1b[D')" title="Left">←</button>
    <button onclick="sendKey('\x1b[C')" title="Right">→</button>
    <button onclick="pasteText()" title="Paste">📋</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/terminal.js"></script>
</body>
</html>
